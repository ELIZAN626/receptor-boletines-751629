name: CI/CD Receptor Boletines

on:
  push:
    branches: [ "main" ]

jobs:
  # Actividad 2: Etapa de Build (hacemos una validacion de codigo)
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Instalación de dependencias (Build)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

  # Actividad 3: Etapa de Docker
  docker:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v3

      - name: Configurar credenciales de AWS
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login a Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build and Push image
        env:
          ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY_URI }}
          IMAGE_TAG: ${{ github.sha }} # Requisito: Etiqueta diferente por version
        run: |
          # Construimos la imagen usando la URI del secreto
          docker build -t $ECR_REPOSITORY:$IMAGE_TAG .
          # También le ponemos 'latest' para que sea fácil identificar la última
          docker tag $ECR_REPOSITORY:$IMAGE_TAG $ECR_REPOSITORY:latest
          # Subimos ambas
          docker push $ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REPOSITORY:latest

  # Actividad 4: Etapa de Deploy 1
  deploy:
    needs: docker
    runs-on: ubuntu-latest
    steps:
      - name: Despliegue del Receptor en EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # 1. Autenticarse en ECR
            aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin ${{ secrets.ECR_REPOSITORY_URI }}
            
            # 2. Detener y eliminar el contenedor anterior si existe
            # Usamos un nombre específico para no chocar con los otros servicios
            docker stop receptor-container || true
            docker rm receptor-container || true
            
            # 3. Descargar la imagen más reciente
            docker pull ${{ secrets.ECR_REPOSITORY_URI }}:latest
            
            # 4. Correr el contenedor (SIN el parámetro -p)
            docker run -d --name receptor-container \
              -e SQS_URL=${{ secrets.SQS_URL }} \
              -e SNS_ARN=${{ secrets.SNS_ARN }} \
              -e DYNAMO_TABLE=${{ secrets.DYNAMO_TABLE }} \
              -e AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }} \
              -e AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }} \
              -e AWS_SESSION_TOKEN=${{ secrets.AWS_SESSION_TOKEN }} \
              -e AWS_REGION=us-east-1 \
              -e PYTHONUNBUFFERED=1 \
              ${{ secrets.ECR_REPOSITORY_URI }}:latest