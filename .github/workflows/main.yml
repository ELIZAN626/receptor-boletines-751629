name: CI/CD Receptor Boletines

on:
  push:
    branches: [ "main" ]

jobs:
  # Actividad 2: Etapa de Build (hacemos una validacion de codigo)
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Instalación de dependencias (Build)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

  # Actividad 3: Etapa de Docker
  docker:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v3

      - name: Configurar credenciales de AWS
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login a Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build and Push image
        env:
          ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY_URI }}
          IMAGE_TAG: ${{ github.sha }} # Requisito: Etiqueta diferente por version
        run: |
          # Construimos la imagen usando la URI del secreto
          docker build -t $ECR_REPOSITORY:$IMAGE_TAG .
          # También le ponemos 'latest' para que sea fácil identificar la última
          docker tag $ECR_REPOSITORY:$IMAGE_TAG $ECR_REPOSITORY:latest
          # Subimos ambas
          docker push $ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REPOSITORY:latest

  # Actividad 4: Etapa de Deploy
  deploy:
    needs: docker
    runs-on: ubuntu-latest
    steps:
      - name: Placeholder para Deploy
        run: echo "Aquí configuraremos el despliegue a la EC2 en la Actividad 4"